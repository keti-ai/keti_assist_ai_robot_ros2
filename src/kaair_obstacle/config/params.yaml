# =============================================================================
# Voxel Pipeline 파라미터 설정
# =============================================================================
# 핵심: voxel_size 하나로 전체 파이프라인 해상도 조절
#
# voxel_size 가이드:
#   0.02m  - 정밀 (포인트 많음, 느림)
#   0.05m  - 실내 표준 (권장)
#   0.08m  - 빠른 처리 (원거리 환경)
#   0.10m  - 최고속 (형태 단순화 강함)

voxel_pipeline_node:
  ros__parameters:

    # ── 입력 토픽 ────────────────────────────────────────────────────
    # Orbbec 카메라 토픽명으로 변경 필요
    input_topic: '/femto/depth_registered/points'

    # ── 핵심: Voxel 해상도 ───────────────────────────────────────────
    voxel_size: 0.05        # 5cm 격자 (실내 표준)

    # ── ROI 필터 (카메라 기준 좌표계) ────────────────────────────────
    roi_x_min: -3.0         # 좌우
    roi_x_max:  3.0
    roi_y_min: -3.0         # 상하 (카메라 좌표계에서 y)
    roi_y_max:  3.0
    roi_z_min:  0.1         # 카메라 바로 앞부터
    roi_z_max:  4.0         # 최대 감지 거리

    # ── 바닥 제거 ────────────────────────────────────────────────────
    ground_height_threshold: 0.10   # 바닥 레이어 두께 (voxel_size의 2배 권장)
    ground_z_percentile: 5.0        # 최저 Z 하위 5% 기준

    # ── 클러스터링 ───────────────────────────────────────────────────
    min_cluster_voxels: 10          # 너무 작은 노이즈 클러스터 제거
    max_cluster_voxels: 5000        # 너무 큰 클러스터 (벽 등) 제거
    cluster_connectivity: 26        # 26-연결 (대각선 포함) 권장

    # ── Collision 판정 ───────────────────────────────────────────────
    robot_safety_radius: 0.5        # 안전 반경 (m)
    robot_x: 0.0                    # 로봇 위치 (카메라 좌표계 기준)
    robot_y: 0.0
    robot_z: 0.0