# arm_controllers.yaml
# arm_controller_manager  (namespace: /arm) – 실제 하드웨어 모드
#
# ROS2 Humble 에서 --params-file 은 노드의 FQN (/arm/controller_manager) 으로
# YAML 키를 매칭하므로 네임스페이스 prefix 가 반드시 필요하다.

/arm/controller_manager:
  ros__parameters:
    update_rate: 150
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    xarm7_traj_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    xarm7_forward_controller:
      type: forward_command_controller/ForwardCommandController

/arm/xarm7_traj_controller:
  ros__parameters:
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7
    constraints:
      goal_time: 0.2
      stopped_velocity_tolerance: 0.0
      joint1: {trajectory: 1.0, goal: 0.02}
      joint2: {trajectory: 1.0, goal: 0.02}
      joint3: {trajectory: 1.0, goal: 0.02}
      joint4: {trajectory: 1.0, goal: 0.02}
      joint5: {trajectory: 1.0, goal: 0.02}
      joint6: {trajectory: 1.0, goal: 0.02}
      joint7: {trajectory: 1.0, goal: 0.02}
    interface_name: position
    state_publish_rate: 25.0
    action_monitor_rate: 10.0
    open_loop_control: true

/arm/xarm7_forward_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7
    interface_name: position
