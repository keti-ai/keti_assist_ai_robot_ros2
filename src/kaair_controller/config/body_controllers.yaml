# body_controllers.yaml
# body_controller_manager (namespace: /body) – 실제 하드웨어 모드
#
# ROS2 Humble 에서 --params-file 은 노드의 FQN (/body/controller_manager) 으로
# YAML 키를 매칭하므로 네임스페이스 prefix 가 반드시 필요하다.

/body/controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    lift_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    lift_forward_controller:
      type: forward_command_controller/ForwardCommandController
    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    head_forward_controller:
      type: forward_command_controller/ForwardCommandController
    tool_controller:
      type: position_controllers/GripperActionController
    tool_forward_controller:
      type: forward_command_controller/ForwardCommandController

/body/lift_controller:
  ros__parameters:
    joints:
      - lift_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.06
      goal_time: 10.0
      lift_joint:
        trajectory: 0.0
        goal: 0.005

/body/lift_forward_controller:
  ros__parameters:
    joints:
      - lift_joint
    interface_name: position

/body/head_controller:
  ros__parameters:
    joints:
      - head_joint1
      - head_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
    constraints:
      goal_time: 10.0
      head_joint1: {trajectory: 0.0, goal: 0.07}
      head_joint2: {trajectory: 0.0, goal: 0.07}

/body/head_forward_controller:
  ros__parameters:
    joints:
      - head_joint1
      - head_joint2
    interface_name: position

/body/tool_controller:
  ros__parameters:
    joint: virtual_gripper_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.002
    allow_stalling: true
    stall_timeout: 0.8
    stall_velocity_threshold: 0.001

/body/tool_forward_controller:
  ros__parameters:
    joints:
      - virtual_gripper_joint
    interface_name: position
