# MoveIt trajectory execution config – 실제 하드웨어 모드
#
# 두 개의 controller_manager 를 사용하는 구성:
#   /arm/controller_manager  → xarm7_traj_controller
#   /body/controller_manager → lift_controller, head_controller, tool_controller
#
# MoveItSimpleControllerManager 는 action client 를 생성할 때
# controller_names 의 값을 절대 경로로 해석한다.
# 네임스페이스 /arm, /body 를 붙여 올바른 action server 에 연결한다.
#   /arm/xarm7_traj_controller/follow_joint_trajectory
#   /body/lift_controller/follow_joint_trajectory
#   /body/head_controller/follow_joint_trajectory
#   /body/tool_controller/gripper_cmd

trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 1.0
  execution_duration_monitoring: true

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - /arm/xarm7_traj_controller
    - /body/lift_controller
    - /body/head_controller
    - /body/tool_controller

  /arm/xarm7_traj_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7

  /body/lift_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - lift_joint

  /body/head_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - head_joint1
      - head_joint2

  /body/tool_controller:
    action_ns: gripper_cmd
    type: GripperCommand
    default: true
    joints:
      - virtual_gripper_joint
