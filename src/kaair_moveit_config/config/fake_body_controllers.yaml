# fake_body_controllers.yaml
# body_controller_manager (namespace: /body) – use_fake_hardware=true 모드

/body/controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    lift_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    tool_controller:
      type: position_controllers/GripperActionController

/body/lift_controller:
  ros__parameters:
    joints:
      - lift_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

/body/head_controller:
  ros__parameters:
    joints:
      - head_joint1
      - head_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

/body/tool_controller:
  ros__parameters:
    joint: virtual_gripper_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    allow_stalling: true
    stall_timeout: 20.0
    stall_velocity_threshold: 0.0005
