# MoveIt trajectory execution config for FAKE hardware mode.
# Controller names must match those defined in
# kaair_moveit_config/config/ros2_controllers.yaml.

trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 1.0
  execution_duration_monitoring: true

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - lift_controller
    - head_controller
    - tool_controller

  arm_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7

  lift_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - lift_joint

  head_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - head_joint1
      - head_joint2

  tool_controller:
    action_ns: gripper_cmd
    type: GripperCommand
    default: true
    joints:
      - virtual_gripper_joint
