# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    lift_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    tool_controller:
      type: position_controllers/GripperActionController


    # Head를 제어할 Action Server 역할
    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
lift_controller:
  ros__parameters:
    joints:
      - lift_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
tool_controller:
  ros__parameters:
    joint: virtual_gripper_joint

head_controller:
  ros__parameters:
    joints:
      - head_joint1
      - head_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
    
    # Action 완료 판단을 위한 허용 오차 (라디안 단위)
    
    constraints:
      goal_time: 10.0
      head_joint1: {trajectory: 0.0, goal: 0.07}
      head_joint2: {trajectory: 0.0, goal: 0.07}